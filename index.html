    <style>
        /* This adds the 'bounce' effect when you get a math question right */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce { animation: bounce 0.5s infinite; }
    </style>
</head>
